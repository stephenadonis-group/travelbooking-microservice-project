controller:
  admin:
    username: "stephen"
    password: "stephen@123"

  # Jenkins Configuration as Code
  JCasC:
    securityRealm: |
      local:
        allowsSignup: false
        enableCaptcha: false
        users:
          - id: "stephen"
            name: "stephen"
            password: "stephen@123"
    authorizationStrategy: |
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false

    configScripts:
      cloud-config: |
        jenkins:
          clouds:
            - kubernetes:
                name: "eks"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080/jenkins"
                containerCapStr: "10"
                maxRequestsPerHostStr: "32"
                templates:
                  - name: "travelbooking-agent"
                    label: "travelbooking"
                    namespace: "jenkins"
                    yaml: |
                      apiVersion: v1
                      kind: Pod
                      spec:
                        containers:
                          - name: "jnlp"
                            image: "jenkins/inbound-agent:latest"
                            workingDir: "/home/jenkins"
                            tty: true

                          - name: "kaniko"
                            image: "gcr.io/kaniko-project/executor:debug"
                            imagePullPolicy: "IfNotPresent"
                            command: ["/busybox/cat"]
                            tty: true
                            workingDir: "/home/jenkins"

                          - name: "nodejs"
                            image: "node:20"
                            imagePullPolicy: "IfNotPresent"
                            command: ["cat"]
                            tty: true
                            workingDir: "/home/jenkins"

                          - name: "golang"
                            image: "golang:1.21"
                            imagePullPolicy: "IfNotPresent"
                            command: ["cat"]
                            tty: true
                            workingDir: "/home/jenkins"

                          - name: "docker"
                            image: "docker:24-dind"
                            imagePullPolicy: "IfNotPresent"
                            tty: true
                            securityContext:
                              privileged: true
                            command:
                              - sh
                              - -c
                              - |
                                dockerd-entrypoint.sh &
                                while ! docker info >/dev/null 2>&1; do
                                  echo "Waiting for Docker daemon..."
                                  sleep 2
                                done
                                cat
                            volumeMounts:
                              - name: docker-storage
                                mountPath: /var/lib/docker

                          - name: "helm"
                            image: "alpine/helm:3.15"
                            imagePullPolicy: "IfNotPresent"
                            command: ["cat"]
                            tty: true
                            workingDir: "/home/jenkins"

                          - name: "awscli"
                            image: "amazon/aws-cli:latest"
                            imagePullPolicy: "IfNotPresent"
                            command: ["cat"]
                            tty: true
                            workingDir: "/home/jenkins"
                            env:
                              - name: AWS_DEFAULT_REGION
                                value: "us-east-1"
                                
                          - name: "trivy"
                            image: "aquasec/trivy:latest"
                            imagePullPolicy: "IfNotPresent"
                            command: ["cat"]
                            tty: true
                            workingDir: "/home/jenkins"
                            
                        volumes:
                          - name: docker-storage
                            emptyDir: {}

  installPlugins:
    - kubernetes:latest
    - git:latest
    - blueocean:latest
    - workflow-aggregator:latest
    - credentials-binding:latest
    - github:latest
    - configuration-as-code:latest
    - pipeline-stage-view:latest
    - pipeline-graph-view:latest
    - timestamper:latest
    - ansicolor:latest
    - ws-cleanup:latest
    - docker-workflow:latest
    - pipeline-utility-steps:latest
    - rebuild:latest
    - build-timeout:latest

  javaOpts: "-Xms1536m -Xmx1536m -Djenkins.install.runSetupWizard=false"
  jenkinsUrl: "http://steveops.site/jenkins"
  jenkinsUriPrefix: "/jenkins"

  resources:
    limits:
      cpu: "1"
      memory: 2000Mi
    requests:
      cpu: 100m
      memory: 1024Mi

  serviceType: NodePort

persistence:
  enabled: false
  size: 20Gi
  storageClass: "gp3"

serviceAccount:
  name: "cd-jenkins"
  create: true
