apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  payment-service.json: |
    {
      "title": "Payment Service",
      "uid": "payment-service-dash",
      "tags": ["travel-booking", "payment-service"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Payment Success Rate (%)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "rate(payment_success_total[5m]) / (rate(payment_success_total[5m]) + rate(payment_failure_total[5m])) * 100", "legendFormat": "Success Rate"}]
        },
        {
          "id": 2,
          "title": "Payments per Minute",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {"expr": "rate(payment_success_total[1m]) * 60", "legendFormat": "Successful"},
            {"expr": "rate(payment_failure_total[1m]) * 60", "legendFormat": "Failed"},
            {"expr": "rate(payment_refund_total[1m]) * 60", "legendFormat": "Refunded"}
          ]
        },
        {
          "id": 3,
          "title": "Total Amount Processed",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "payment_total_amount_processed", "legendFormat": "Total ($)"}]
        },
        {
          "id": 4,
          "title": "Response Time p50/p95/p99",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by(le) (rate(payment_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by(le) (rate(payment_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum by(le) (rate(payment_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 5,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {"expr": "sum by (pod) (container_memory_working_set_bytes{namespace='travel-booking', container='payment-service'})", "legendFormat": "{{pod}}"}
          ]
        }
      ]
    }
