apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  notification-service.json: |
    {
      "title": "Notification Service",
      "uid": "notification-service-dash",
      "tags": ["travel-booking", "notification-service"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Notifications Sent per Minute",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "rate(notification_sent_total{type='booking_confirmed'}[1m]) * 60", "legendFormat": "Booking Confirmed"},
            {"expr": "rate(notification_sent_total{type='booking_cancelled'}[1m]) * 60", "legendFormat": "Booking Cancelled"},
            {"expr": "rate(notification_sent_total{type='payment_success'}[1m]) * 60", "legendFormat": "Payment Success"},
            {"expr": "rate(notification_sent_total{type='payment_failed'}[1m]) * 60", "legendFormat": "Payment Failed"}
          ]
        },
        {
          "id": 2,
          "title": "Queue Size",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "notification_queue_size", "legendFormat": "Pending Jobs"}]
        },
        {
          "id": 3,
          "title": "Emails Sent per Minute",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{"expr": "rate(notification_emails_sent_total[1m]) * 60", "legendFormat": "Emails/min"}]
        }
      ]
    }
