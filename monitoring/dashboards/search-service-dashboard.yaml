apiVersion: v1
kind: ConfigMap
metadata:
  name: search-service-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  search-service.json: |
    {
      "title": "Search Service",
      "uid": "search-service-dash",
      "tags": ["travel-booking", "search-service"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Search Queries per Minute",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "rate(search_queries_total{type='flight'}[1m]) * 60", "legendFormat": "Flight Searches/min"},
            {"expr": "rate(search_queries_total{type='hotel'}[1m]) * 60", "legendFormat": "Hotel Searches/min"}
          ]
        },
        {
          "id": 2,
          "title": "Cache Hit Rate (%)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "rate(search_cache_hits_total{result='hit'}[5m]) / (rate(search_cache_hits_total{result='hit'}[5m]) + rate(search_cache_hits_total{result='miss'}[5m])) * 100", "legendFormat": "Cache Hit %"}]
        },
        {
          "id": 3,
          "title": "Response Time Percentiles",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by(le) (rate(search_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by(le) (rate(search_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum by(le) (rate(search_http_request_duration_seconds_bucket[5m])))", "legendFormat": "p99"}
          ]
        }
      ]
    }
