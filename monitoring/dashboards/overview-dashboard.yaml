apiVersion: v1
kind: ConfigMap
metadata:
  name: overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  overview.json: |
    {
      "title": "Travel Booking - Overview",
      "uid": "travel-overview",
      "tags": ["travel-booking", "overview"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Total Request Rate (All Services)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "sum(rate(user_http_requests_total[5m]) + rate(search_http_requests_total[5m]) + rate(booking_http_requests_total[5m]) + rate(payment_http_requests_total[5m]) + rate(notification_http_requests_total[5m]))",
            "legendFormat": "Total RPS"
          }]
        },
        {
          "id": 2,
          "title": "Overall Error Rate (%)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{
            "expr": "sum(rate(user_http_requests_total{status_code=~'5..'}[5m]) + rate(booking_http_requests_total{status_code=~'5..'}[5m]) + rate(payment_http_requests_total{status_code=~'5..'}[5m])) / sum(rate(user_http_requests_total[5m]) + rate(booking_http_requests_total[5m]) + rate(payment_http_requests_total[5m])) * 100",
            "legendFormat": "Error Rate %"
          }]
        },
        {
          "id": 3,
          "title": "Payment Success Rate (%)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{
            "expr": "rate(payment_success_total[5m]) / (rate(payment_success_total[5m]) + rate(payment_failure_total[5m])) * 100",
            "legendFormat": "Success Rate"
          }]
        },
        {
          "id": 4,
          "title": "Notification Queue Size",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [{
            "expr": "notification_queue_size",
            "legendFormat": "Queue Size"
          }]
        },
        {
          "id": 5,
          "title": "Request Rate per Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {"expr": "sum(rate(user_http_requests_total[5m]))", "legendFormat": "User Service"},
            {"expr": "sum(rate(search_http_requests_total[5m]))", "legendFormat": "Search Service"},
            {"expr": "sum(rate(booking_http_requests_total[5m]))", "legendFormat": "Booking Service"},
            {"expr": "sum(rate(payment_http_requests_total[5m]))", "legendFormat": "Payment Service"},
            {"expr": "sum(rate(notification_http_requests_total[5m]))", "legendFormat": "Notification Service"}
          ]
        },
        {
          "id": 6,
          "title": "Response Time p95 per Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by(le) (rate(user_http_request_duration_seconds_bucket[5m])))", "legendFormat": "User p95"},
            {"expr": "histogram_quantile(0.95, sum by(le) (rate(booking_http_request_duration_seconds_bucket[5m])))", "legendFormat": "Booking p95"},
            {"expr": "histogram_quantile(0.95, sum by(le) (rate(payment_http_request_duration_seconds_bucket[5m])))", "legendFormat": "Payment p95"}
          ]
        },
        {
          "id": 7,
          "title": "GKE Cluster CPU Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "avg(rate(node_cpu_seconds_total{mode!='idle'}[5m])) * 100",
            "legendFormat": "Cluster CPU %"
          }]
        },
        {
          "id": 8,
          "title": "GKE Cluster Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{
            "expr": "sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024 / 1024 / 1024",
            "legendFormat": "Memory Used (GB)"
          }]
        }
      ]
    }
