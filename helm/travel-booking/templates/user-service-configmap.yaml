apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: production
  PORT: "3001"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.userDb | quote }}
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
