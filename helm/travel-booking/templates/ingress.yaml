apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travel-booking-ingress
  namespace: travel-booking
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/group.name: travel-booking
spec:
  ingressClassName: alb
  rules:
    - host: travel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service-service
                port:
                  number: 3001

          - path: /api/search
            pathType: Prefix
            backend:
              service:
                name: search-service-service
                port:
                  number: 3002

          - path: /api/bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service-service
                port:
                  number: 3003

          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service-service
                port:
                  number: 3004

          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service-service
                port:
                  number: 3005