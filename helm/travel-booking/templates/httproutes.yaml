apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: travel-booking
spec:
  parentRefs:
  - name: travel-booking-gateway
    namespace: travel-booking
  hostnames:
  - vijaygiduthuri.in
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 80
---
