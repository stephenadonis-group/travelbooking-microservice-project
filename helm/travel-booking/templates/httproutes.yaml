# ─── User Service HTTPRoute ────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: user-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/users
    backendRefs:
    - name: {{ .Values.userService.servicename }}
      port: 3001
---
