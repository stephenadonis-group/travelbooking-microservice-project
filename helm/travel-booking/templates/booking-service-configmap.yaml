apiVersion: v1
kind: ConfigMap
metadata:
  name: booking-service-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: production
  PORT: "3003"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.bookingDb | quote }}
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  USER_SERVICE_URL: "http://{{ .Values.userService.servicename }}:3001"
  NOTIFICATION_SERVICE_URL: "http://{{ .Values.notificationService.servicename }}:3005"
