apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: production
  PORT: "3004"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.paymentDb | quote }}
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  BOOKING_SERVICE_URL: "http://{{ .Values.bookingService.servicename }}:3003"
  NOTIFICATION_SERVICE_URL: "http://{{ .Values.notificationService.servicename }}:3005"
