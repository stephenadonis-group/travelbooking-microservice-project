apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.notificationService.deploymentname }}
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
spec:
  replicas: {{ .Values.notificationService.replicas }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: {{ .Values.notificationService.image }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3005
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        envFrom:
        - configMapRef:
            name: notification-service-config
        - secretRef:
            name: notification-service-secret
