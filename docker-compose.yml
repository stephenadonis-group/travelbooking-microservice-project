networks:
  travel-booking-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  # ─── Database ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - travel-booking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Cache ────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - travel-booking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Application Services ─────────────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      PORT: "3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: userdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-strong-secret-in-production}
      NODE_ENV: production
    ports:
      - "3001:3001"
    networks:
      - travel-booking-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-service
    environment:
      PORT: "3002"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: searchdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: production
    ports:
      - "3002:3002"
    networks:
      - travel-booking-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    environment:
      PORT: "3003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookingdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-strong-secret-in-production}
      USER_SERVICE_URL: http://user-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      NODE_ENV: production
    ports:
      - "3003:3003"
    networks:
      - travel-booking-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      PORT: "3004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: paymentdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-strong-secret-in-production}
      BOOKING_SERVICE_URL: http://booking-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      NODE_ENV: production
    ports:
      - "3004:3004"
    networks:
      - travel-booking-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      PORT: "3005"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: notificationdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: production
    ports:
      - "3005:3005"
    networks:
      - travel-booking-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  react-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "3000:80"
    networks:
      - travel-booking-network
    depends_on:
      - user-service
      - search-service
      - booking-service
      - payment-service
      - notification-service
    restart: unless-stopped

  # ─── Nginx Gateway (routes traffic like GKE Gateway) ─────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - travel-booking-network
    depends_on:
      - react-frontend
      - user-service
      - search-service
      - booking-service
      - payment-service
      - notification-service
    restart: unless-stopped
